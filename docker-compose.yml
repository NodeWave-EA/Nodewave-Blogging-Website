services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nodewave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nodewave_blog
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - nodewave-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U strapi -d nodewave_blog']
      interval: 10s
      timeout: 5s
      retries: 5

  # Strapi Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nodewave-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      STRAPI_API_URL: http://vps-e5e8d3b4.vps.ovh.net:1337
      STRAPI_ADMIN_URL: http://vps-e5e8d3b4.vps.ovh.net:1337/admin
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: nodewave_blog
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_dev_password
      DATABASE_SSL: false
      APP_KEYS: ${APP_KEYS:-development_key_1,development_key_2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-development_api_token_salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-development_admin_jwt_secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-development_transfer_token_salt}
      JWT_SECRET: ${JWT_SECRET:-development_jwt_secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-development_encryption_key}
      ADMIN_REGISTRATION_ENABLED: true
      ALLOW_REGISTER: true
      EMAIL_CONFIRMATION: false
      UNIQUE_EMAIL: true
      BLOG_URL: http://vps-e5e8d3b4.vps.ovh.net:1337
      FRONTEND_URL: http://vps-e5e8d3b4.vps.ovh.net:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/public/uploads
    ports:
      - '1337:1337'
    networks:
      - nodewave-network
    depends_on:
      postgres:
        condition: service_healthy

  # Vue Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nodewave-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Base API URL for Strapi backend
      VITE_API_URL: http://vps-e5e8d3b4.vps.ovh.net:1337/api
      VITE_STRAPI_BASE_URL: http://vps-e5e8d3b4.vps.ovh.net:1337
      VITE_API_TOKEN: 6d0b5c446d8ea9c1036aeff5c99f745809049cf3f53ebfbaf7a85216804083516d4e3b6b2bfe63bf71487fb225d113c284f6a2eddab6ec2af852eefaf5a5cada8de12f9ddc9eb0f15a047b2094f14e49033021923a9a42e5510b4e149dc5a35c824778585b19d47f23fe5f6b82cc2a0b9cb35449d2a049ca0e71090759d7986f
      # Site URL
      VITE_SITE_URL: http://vps-e5e8d3b4.vps.ovh.net:5173
      # Theme
      VITE_DEFAULT_THEME: system
      # Analytics
      VITE_GOOGLE_ANALYTICS_ID: ''
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    networks:
      - nodewave-network
    depends_on:
      - backend

networks:
  nodewave-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
